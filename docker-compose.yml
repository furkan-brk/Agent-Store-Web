## WARNING: Default credentials below are for LOCAL DEVELOPMENT ONLY.
## In production, set POSTGRES_USER and POSTGRES_PASSWORD via environment
## variables or a .env file with strong, unique values. Never deploy with defaults.
services:
  postgres:
    image: postgres:16-alpine
    container_name: agent_store_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_store}
      POSTGRES_USER: ${POSTGRES_USER:-agent_user}          # CHANGE IN PRODUCTION
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_pass}   # CHANGE IN PRODUCTION
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_user} -d ${POSTGRES_DB:-agent_store}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent_store_redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # --- Microservices ---

  gateway:
    build:
      context: ./backend
      dockerfile: deploy/gateway.Dockerfile
    container_name: agent_store_gateway
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://authsvc:8081
      AGENT_SERVICE_URL: http://agentsvc:8082
      AI_PIPELINE_SERVICE_URL: http://aipipelinesvc:8083
      GUILD_SERVICE_URL: http://guildsvc:8084
      WORKSPACE_SERVICE_URL: http://workspacesvc:8085
    ports:
      - "8080:8080"
    depends_on:
      authsvc:
        condition: service_healthy
      agentsvc:
        condition: service_healthy
      workspacesvc:
        condition: service_healthy
    restart: unless-stopped

  authsvc:
    build:
      context: ./backend
      dockerfile: deploy/authsvc.Dockerfile
    container_name: agent_store_authsvc
    env_file: .env
    environment:
      PORT: "8081"
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  agentsvc:
    build:
      context: ./backend
      dockerfile: deploy/agentsvc.Dockerfile
    container_name: agent_store_agentsvc
    env_file: .env
    environment:
      PORT: "8082"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
      AI_PIPELINE_SERVICE_URL: http://aipipelinesvc:8083
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      aipipelinesvc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  aipipelinesvc:
    build:
      context: ./backend
      dockerfile: deploy/aipipelinesvc.Dockerfile
    container_name: agent_store_aipipelinesvc
    env_file: .env
    environment:
      PORT: "8083"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  guildsvc:
    build:
      context: ./backend
      dockerfile: deploy/guildsvc.Dockerfile
    container_name: agent_store_guildsvc
    env_file: .env
    environment:
      PORT: "8084"
      POSTGRES_HOST: postgres
      AI_PIPELINE_SERVICE_URL: http://aipipelinesvc:8083
    depends_on:
      postgres:
        condition: service_healthy
      aipipelinesvc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  workspacesvc:
    build:
      context: ./backend
      dockerfile: deploy/workspacesvc.Dockerfile
    container_name: agent_store_workspacesvc
    env_file: .env
    environment:
      PORT: "8085"
      POSTGRES_HOST: postgres
      AI_PIPELINE_SERVICE_URL: http://aipipelinesvc:8083
      AGENT_SERVICE_URL: http://agentsvc:8082
    depends_on:
      postgres:
        condition: service_healthy
      agentsvc:
        condition: service_healthy
      aipipelinesvc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: agent_store_frontend
    ports:
      - "80:80"
    volumes:
      - ./agent_store/build/web:/usr/share/nginx/html:ro
      - ./agent_store/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
