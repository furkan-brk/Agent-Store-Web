## WARNING: Default credentials below are for LOCAL DEVELOPMENT ONLY.
## In production, set POSTGRES_USER and POSTGRES_PASSWORD via environment
## variables or a .env file with strong, unique values. Never deploy with defaults.
services:
  postgres:
    image: postgres:16-alpine
    container_name: agent_store_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_store}
      POSTGRES_USER: ${POSTGRES_USER:-agent_user}          # CHANGE IN PRODUCTION
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_pass}   # CHANGE IN PRODUCTION
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_user} -d ${POSTGRES_DB:-agent_store}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent_store_redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rembg:
    build: ./rembg
    container_name: agent_store_rembg
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/remove"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_store_backend
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
      REMBG_URL: http://rembg:5000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rembg:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: agent_store_frontend
    ports:
      - "80:80"
    volumes:
      - ./agent_store/build/web:/usr/share/nginx/html:ro
      - ./agent_store/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
