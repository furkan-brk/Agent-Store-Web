server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Reverse proxy API requests to gateway (same-origin for Flutter Web CanvasKit)
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Flutter web SPA — all routes fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Font files — fix MIME types for .otf/.ttf (not in default nginx mime.types)
    location ~* \.(otf|ttf)$ {
        types {
            font/otf   otf;
            font/ttf   ttf;
        }
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "same-origin";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|wasm|json|woff|woff2|eot)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript font/otf font/ttf font/woff font/woff2;
}
