server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web SPA — all routes fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Font files — fix MIME types for .otf/.ttf (not in default nginx mime.types)
    location ~* \.(otf|ttf)$ {
        types {
            font/otf   otf;
            font/ttf   ttf;
        }
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|wasm|json|woff|woff2|eot)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript font/otf font/ttf font/woff font/woff2;
}
