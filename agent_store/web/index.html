<!DOCTYPE html>
<html>
<head>
  <!--

    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for

    This is a placeholder for base href that will be replaced by the value of

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Agent Store">

  <!-- Google Fonts — Inter for crisp, readable web typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Material Icons — preload font so CanvasKit has it cached before Flutter requests it -->

  <!-- <link rel="preload" href="assets/fonts/MaterialIcons-Regular.otf" as="font" type="font/otf" crossorigin> -->

  <!-- Material Icons CSS fallback — ensures icons render even if Flutter font loading is slow -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="icons/app_icon.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Agent Store</title>
  <link rel="manifest" href="manifest.json">

  <!-- ══════════════════════════════════════════════════════════════════════
       MetaMask / Web3 Bridge — window.agentStoreWallet
       Exposes three async functions that Flutter calls via dart:js_interop.
       ══════════════════════════════════════════════════════════════════════ -->
  <script>
    window.agentStoreWallet = {

      /**
       * Requests the user's MetaMask accounts (shows popup if not connected).
       * Returns the first (active) account address as a lowercase string.
       * Falls back to mock wallet if MetaMask is not installed.
       */
      requestAccounts: async function () {
        if (!window.ethereum) {
          console.warn('MetaMask not detected. Using mock wallet for development.');
          // Mock wallet for testing (development only)
          return '0x742d35cc6634c0532925a3b844bc9e7595f42e10';
        }
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        if (!accounts || accounts.length === 0) {
          throw new Error('No accounts returned from MetaMask.');
        }
        return accounts[0].toLowerCase();
      },

      /**
       * Silently checks which accounts MetaMask currently exposes (no popup).
       * Returns the first account address as a lowercase string, or empty string
       * if no accounts are connected.
       * Falls back to mock wallet if MetaMask is not installed.
       */
      getAccounts: async function () {
        if (!window.ethereum) {
          // Mock wallet for development
          return '0x742d35cc6634c0532925a3b844bc9e7595f42e10';
        }
        try {
          const accounts = await window.ethereum.request({ method: 'eth_accounts' });
          if (accounts && accounts.length > 0) {
            return accounts[0].toLowerCase();
          }
        } catch (e) {
          console.warn('getAccounts failed:', e);
        }
        return '';
      },

      /**
       * Signs an arbitrary message with the user's wallet.
       * @param {string} message  — the nonce / message to sign
       * @param {string} address  — the signer's wallet address
       * Returns the hex signature string.
       * Falls back to mock signature if MetaMask is not installed.
       */
      personalSign: async function (message, address) {
        if (!window.ethereum) {
          console.warn('MetaMask not detected. Using mock signature for development.');
          // Mock signature for development: sha256(message)[:66] → 0x + 64 hex chars
          return '0x' + Array.from(message).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('').slice(0, 64);
        }
        const signature = await window.ethereum.request({
          method: 'personal_sign',
          params: [message, address],
        });
        return signature;
      },

      /**
       * Attempts to switch MetaMask to Monad Testnet (ChainID 10143 / 0x279F).
       * If the chain is not yet added it prompts the user to add it.
       */
      switchToMonad: async function () {
        if (!window.ethereum) return;

        const MONAD_CHAIN_ID = '0x279F'; // 10143 decimal

        try {
          await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: MONAD_CHAIN_ID }],
          });
        } catch (switchError) {
          // 4902 = chain not added yet
          if (switchError.code === 4902) {
            await window.ethereum.request({
              method: 'wallet_addEthereumChain',
              params: [{
                chainId: MONAD_CHAIN_ID,
                chainName: 'Monad Testnet',
                nativeCurrency: {
                  name: 'MON',
                  symbol: 'MON',
                  decimals: 18,
                },
                rpcUrls: ['https://testnet-rpc.monad.xyz'],
                blockExplorerUrls: ['https://explorer.monad.xyz'],
              }],
            });
          } else {
            // Non-critical: log and continue — login still works without chain switch
            console.warn('Monad chain switch failed (code ' + switchError.code + '):', switchError.message);
          }
        }
      },

      /**
       * Reads the wallet's currently active chain ID. Returns the raw
       * MetaMask payload — Flutter parses both hex ('0x279F') and decimal
       * ('10143') forms via NetworkGuard.parseChainId.
       * Returns empty string if MetaMask is unavailable.
       */
      getChainId: async function () {
        if (!window.ethereum) return '';
        try {
          const id = await window.ethereum.request({ method: 'eth_chainId' });
          return typeof id === 'string' ? id : '';
        } catch (e) {
          console.warn('getChainId failed:', e);
          return '';
        }
      },

      /**
       * Subscribes to MetaMask's chainChanged event. Calls [callback]
       * with the raw chain ID string each time the user switches networks.
       * Idempotent — re-binding replaces any previous handler.
       */
      onChainChanged: function (callback) {
        if (!window.ethereum) return;
        if (this._chainChangedHandler) {
          window.ethereum.removeListener('chainChanged', this._chainChangedHandler);
        }
        this._chainChangedHandler = function (chainId) {
          try { callback(chainId); } catch (e) { console.warn('chainChanged cb', e); }
        };
        window.ethereum.on('chainChanged', this._chainChangedHandler);
      },

      /**
       * Sends MON tokens to a recipient address (agent purchase).
       * @param {string} toAddress   — recipient wallet (agent creator)
       * @param {string} amountWei   — amount in wei as hex string (e.g. "0xDE0B6B3A7640000" for 1 MON)
       * Returns the transaction hash string.
       */
      sendTransaction: async function (toAddress, amountWei) {
        if (!window.ethereum) {
          throw new Error('MetaMask not detected.');
        }
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const txHash = await window.ethereum.request({
          method: 'eth_sendTransaction',
          params: [{
            from: accounts[0],
            to: toAddress,
            value: amountWei,
            chainId: '0x279F',
          }],
        });
        return txHash;
      },
    };
  </script>

  <!-- Monaco Editor CDN (require.js loader + vs path config) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
  <script>
    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs' } });
  </script>
  <!-- Guild Master Monaco bridge — must load after require.js -->
  <script src="monaco_bridge.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
