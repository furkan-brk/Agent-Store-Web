name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # Backend → Railway (Docker, Go API)
  # -------------------------------------------------------
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare slim Railway deploy directory
        run: |
          rm -rf .railway-deploy
          mkdir -p .railway-deploy
          cp Dockerfile .railway-deploy/Dockerfile
          cp railway.toml .railway-deploy/railway.toml
          cp .dockerignore .railway-deploy/.dockerignore
          cp .railwayignore .railway-deploy/.railwayignore
          cp -R backend .railway-deploy/backend
          rm -rf .railway-deploy/backend/vendor
          # Copy per-service Dockerfiles for multi-service deploy
          mkdir -p .railway-deploy/backend/deploy
          cp -R backend/deploy/*.Dockerfile .railway-deploy/backend/deploy/

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Gateway to Railway
        working-directory: .railway-deploy
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if railway up --service Agent_Store --detach; then exit 0; fi
            if [ "$attempt" -eq 3 ]; then echo "Gateway deploy failed after ${attempt} attempts"; exit 1; fi
            sleep $((attempt * 15))
          done
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Auth Service to Railway
        working-directory: .railway-deploy
        run: railway up --service authsvc --detach || true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Agent Service to Railway
        working-directory: .railway-deploy
        run: railway up --service agentsvc --detach || true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy AI Pipeline Service to Railway
        working-directory: .railway-deploy
        run: railway up --service aipipelinesvc --detach || true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Guild Service to Railway
        working-directory: .railway-deploy
        run: railway up --service guildsvc --detach || true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Workspace Service to Railway
        working-directory: .railway-deploy
        run: railway up --service workspacesvc --detach || true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # -------------------------------------------------------
  # Frontend → Vercel (Flutter Web static build)
  # -------------------------------------------------------
  deploy-frontend:
    name: Build Flutter Web & Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: agent_store
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: agent_store
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}

      - name: Copy vercel.json to build output
        run: cp vercel.json agent_store/build/web/vercel.json

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: agent_store/build/web
          vercel-args: '--prod'
