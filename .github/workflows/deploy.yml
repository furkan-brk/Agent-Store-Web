name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # Backend → Railway (Docker, Go API)
  # -------------------------------------------------------
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service Agent_Store --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # -------------------------------------------------------
  # Frontend → Vercel (Flutter Web static build)
  # -------------------------------------------------------
  deploy-frontend:
    name: Build Flutter Web & Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: agent_store
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: agent_store
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}

      - name: Copy vercel.json to build output
        run: cp vercel.json agent_store/build/web/vercel.json

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: agent_store/build/web
          vercel-args: '--prod'
