name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # Backend → Railway (Docker, Go API)
  # -------------------------------------------------------
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare slim Railway deploy directory
        run: |
          rm -rf .railway-deploy
          mkdir -p .railway-deploy
          cp Dockerfile .railway-deploy/Dockerfile
          cp railway.toml .railway-deploy/railway.toml
          cp .dockerignore .railway-deploy/.dockerignore
          cp .railwayignore .railway-deploy/.railwayignore
          cp -R backend .railway-deploy/backend
          rm -rf .railway-deploy/backend/vendor

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: .railway-deploy
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            if railway up --service Agent_Store --detach; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Railway deploy failed after ${attempt} attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 15))
            echo "Railway deploy attempt ${attempt} failed, retrying in ${sleep_seconds}s"
            sleep "$sleep_seconds"
          done
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  # -------------------------------------------------------
  # Frontend → Vercel (Flutter Web static build)
  # -------------------------------------------------------
  deploy-frontend:
    name: Build Flutter Web & Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: agent_store
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: agent_store
        run: |
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}

      - name: Copy vercel.json to build output
        run: cp vercel.json agent_store/build/web/vercel.json

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: agent_store/build/web
          vercel-args: '--prod'
